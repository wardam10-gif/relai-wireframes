name: Deploy game to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Runs without the github-pages environment so it can enable Pages on a
  # repo where Pages was never turned on (the environment doesn't exist yet).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  # No job-level `environment:` block: the auto-created github-pages
  # environment carries a branch policy that rejects the job before it starts.
  # deploy-pages creates the Pages deployment itself via the API.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
